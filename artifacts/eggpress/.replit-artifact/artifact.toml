kind = "web"
previewPath = "/"
title = "Eggpress"
version = "1.0.0"
id = "artifacts/eggpress"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter eggpress run dev"

[services.production]
build = [ "pnpm", "--filter", "eggpress", "run", "build" ]
publicDir = "artifacts/eggpress/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
