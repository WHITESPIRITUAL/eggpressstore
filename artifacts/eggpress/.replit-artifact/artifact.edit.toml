kind = "web"
previewPath = "/"
title = "Eggpress"
version = "1.0.0"
id = "eggpress-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19551

[services.development]
run = "PORT=19551 BASE_PATH=/ pnpm --filter @workspace/eggpress run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eggpress", "run", "build" ]
publicDir = "artifacts/eggpress/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19551"
BASE_PATH = "/"
